name: Feature request
description: Propose an improvement aligned with the scope of WSAuthKit
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: Explain why this still fits a small focused WebSocket auth library.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share workarounds or alternatives you evaluated.
